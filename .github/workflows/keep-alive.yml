name: Supabase Keep Alive

on:
  schedule:
    - cron: '0 0 */3 * *'  # setiap 3 hari sekali
  workflow_dispatch:         # bisa dijalankan manual juga

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -s \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/units?select=id&limit=1" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_KEY }}"
          echo "Ping sent to Supabase"
